name: "Bug report / Hibajelentés"
description: "Report a reproducible CHERRIFT problem / Jelents egy reprodukálható CHERRIFT-hibát"
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thank you for testing CHERRIFT. Please do not paste your complete local save.
        Köszönjük a tesztelést. Kérjük, ne másold be a teljes helyi mentésedet.
  - type: dropdown
    id: language
    attributes:
      label: Language / Nyelv
      options:
        - Magyar
        - English
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / Verzió
      placeholder: "v0.6.3 TEST BUILD"
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area / Terület
      options:
        - Gameplay / Játékmenet
        - Interface / Felület
        - Gear / Felszerelés
        - Mail / Levelek
        - Performance / Teljesítmény
        - Translation / Fordítás
        - Other / Egyéb
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce / Reprodukálási lépések
      placeholder: "1. ...\n2. ...\n3. ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result / Várt eredmény
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result / Tényleges eredmény
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics / Technikai adatok
      description: "Paste the diagnostic block generated by the in-game Bug Report screen."
  - type: textarea
    id: media
    attributes:
      label: Screenshot or video / Kép vagy videó
      description: "Drag and drop media here if it helps demonstrate the issue."
